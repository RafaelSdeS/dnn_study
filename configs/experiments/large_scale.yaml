name: large_scale
models:
  - alexnet_tv
  - vgg_style
  - mobilenetv2
  - resnet18tv
  - alexnet_bottleneck
  - alexnet_depthwisesep
  - alexnet_fire
  - alexnet_smallkernel
  - alexnet_final_bottleneck_residual
  - alexnet_final_fire_residual
  - alexnet_final_bottleneck_fire
  - alexnet_final_depthwise_fire
seed: 42
stages:
  - fp32
  - qat
  - int8
data:
  batch_size: 64
  num_workers: 4
  pin_memory: true
  train_val_split: 0.9
training:
  epochs: 1000
  lr: 3.0e-4
  weight_decay: 5.0e-4
  label_smoothing: 0.1
  grad_clip_norm: null
  use_amp: true
  early_stopping_patience: 20
qat:
  epochs: 100
  lr: 1.0e-5
  weight_decay: 5.0e-4
  freeze_bn_epoch: 3
  disable_observer_epoch: 5
