name: default
models: all
seed: 42
stages:
  - fp32
  - qat
  - int8
data:
  batch_size: 64
  num_workers: 4
  pin_memory: true
  train_val_split: 0.9
training:
  epochs: 100
  lr: 3.0e-4
  weight_decay: 5.0e-4
  label_smoothing: 0.1
  grad_clip_norm: null
  use_amp: true
  early_stopping_patience: 5
qat:
  epochs: 20
  lr: 1.0e-5
  weight_decay: 5.0e-4
  freeze_bn_epoch: 3
  disable_observer_epoch: 5
