# Phase 7 detection training config

data:
  img_size: 256
  voc_root: ~/.cache/torchvision/datasets
  batch_size: 16
  num_workers: 4
  pin_memory: true
  seed: 42

trainer:
  epochs: 30
  lr: 1.0e-4
  weight_decay: 4.0e-4
  label_smoothing: 0.1
  grad_clip_norm: null
  use_amp: false
  early_stopping_patience: 10
